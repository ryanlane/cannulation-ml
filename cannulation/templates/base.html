<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Cannulation ML{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #f1f5f9;
      --surface:  #ffffff;
      --border:   #e2e8f0;
      --text:     #1e293b;
      --muted:    #64748b;
      --accent:   #4f46e5;
      --info:     #0ea5e9;
      --warning:  #d97706;
      --critical: #dc2626;
      --ok:       #16a34a;
    }

    body {
      font-family: ui-monospace, "Cascadia Code", "Source Code Pro", monospace;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.6;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      height: 56px;
    }

    header a { text-decoration: none; color: inherit; }

    .logo {
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.5px;
    }

    .logo span { color: var(--muted); font-weight: 400; }

    nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.85rem;
    }
    nav a:hover { color: var(--text); }

    main { max-width: 1100px; margin: 0 auto; padding: 2rem; }

    h1 { font-size: 1.3rem; font-weight: 700; margin-bottom: 0.25rem; }
    h2 { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; color: var(--muted); }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem 1.5rem;
    }

    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      padding: 0.5rem 0.75rem;
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 0.6rem 0.75rem;
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--bg); }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .badge {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .badge-critical { background: #fee2e2; color: var(--critical); }
    .badge-warning  { background: #fef3c7; color: var(--warning); }
    .badge-info     { background: #e0f2fe; color: var(--info); }
    .badge-ok       { background: #dcfce7; color: var(--ok); }

    .stat-row {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      flex: 1;
    }
    .stat-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-value { font-size: 1.4rem; font-weight: 700; margin-top: 0.2rem; }
  </style>
</head>
<body>
  <header>
    <a href="/" class="logo">cannulation<span>-ml</span></a>
    <nav>
      <a href="/">runs</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
